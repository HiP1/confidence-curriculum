<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; background: #fff;">

<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ======================== -->
<!-- ROW 0: CC organising lens -->
<!-- ======================== -->
<rect x="240" y="20" width="480" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="480" y="39" text-anchor="middle" font-size="15" font-weight="600" fill="#085041">Confidence Curriculum</text>
<text x="480" y="57" text-anchor="middle" font-size="11" fill="#0F6E56">Organising lens (causal hypothesis under test)</text>

<!-- ======================== -->
<!-- ROW 1: Paper 1 + support -->
<!-- ======================== -->
<rect x="360" y="116" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="460" y="138" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">Paper 1</text>
<text x="460" y="156" text-anchor="middle" font-size="12" fill="#534AB7">Exploratory empirical study</text>

<!-- P1 independent support (right) -->
<rect x="640" y="120" width="240" height="48" rx="6" fill="#fff" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="760" y="141" text-anchor="middle" font-size="11" fill="#3C3489">Prompt injection literature</text>
<text x="760" y="156" text-anchor="middle" font-size="11" font-style="italic" fill="#999">corroborates; replication needed</text>

<!-- Support arrow → P1 -->
<line x1="638" y1="144" x2="562" y2="144" stroke="#534AB7" stroke-width="1" marker-end="url(#arr)"/>

<!-- CC → P1: dashed vertical -->
<line x1="480" y1="72" x2="460" y2="114" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- CC → P3: dashed diagonal (left, bypasses P1) -->
<path d="M260 62 L170 220" fill="none" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- CC → P5: dashed diagonal (right, bypasses P1) -->
<path d="M700 62 L780 220" fill="none" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- "frames" label on left diagonal -->
<text x="192" y="130" font-size="10" fill="#0F6E56" transform="rotate(-38, 192, 130)">frames</text>

<!-- ======================== -->
<!-- P1 → P3, P4, P5 arrows -->
<!-- ======================== -->

<!-- P1 → P3: solid -->
<path d="M388 172 L195 218" fill="none" stroke="#534AB7" stroke-width="1.3" marker-end="url(#arr)"/>
<text x="278" y="186" text-anchor="middle" font-size="10" fill="#534AB7">informs</text>

<!-- P1 → P4: dashed vertical -->
<line x1="460" y1="172" x2="460" y2="218" stroke="#999" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- P1 → P5: dashed diagonal -->
<path d="M530 172 L760 218" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="665" y="186" text-anchor="middle" font-size="10" fill="#999">not required</text>

<!-- ======================================= -->
<!-- ROW 2: Papers 3, 4, 5 (Diagnostic)     -->
<!-- ======================================= -->
<rect x="60" y="222" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="170" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Paper 2</text>
<text x="170" y="262" text-anchor="middle" font-size="12" fill="#0F6E56">Security analysis</text>

<rect x="350" y="222" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
<text x="460" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#0C447C">Paper 3</text>
<text x="460" y="262" text-anchor="middle" font-size="12" fill="#185FA5">Institutional argument</text>

<rect x="660" y="222" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
<text x="770" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#633806">Paper 4</text>
<text x="770" y="262" text-anchor="middle" font-size="12" fill="#BA7517">Position paper + agenda</text>

<!-- ======================================= -->
<!-- ROW 2 support boxes                     -->
<!-- ======================================= -->
<rect x="40" y="308" width="260" height="48" rx="6" fill="#fff" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="170" y="329" text-anchor="middle" font-size="11" fill="#085041">SkillJect, Invariant Labs, ToxicSkills</text>
<text x="170" y="344" text-anchor="middle" font-size="11" font-style="italic" fill="#999">independently validated</text>

<rect x="340" y="308" width="260" height="48" rx="6" fill="#fff" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="470" y="329" text-anchor="middle" font-size="11" fill="#0C447C">Legal frameworks, licensing, deskilling</text>
<text x="470" y="344" text-anchor="middle" font-size="11" fill="#0C447C">research, EU AI Act</text>

<rect x="640" y="308" width="260" height="48" rx="6" fill="#fff" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="770" y="329" text-anchor="middle" font-size="11" fill="#633806">Cognitive offloading, automation bias,</text>
<text x="770" y="344" text-anchor="middle" font-size="11" fill="#633806">BCG study, reasoning trust research</text>

<!-- Support arrows (upward into papers) -->
<line x1="170" y1="306" x2="170" y2="280" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr)"/>
<line x1="470" y1="306" x2="460" y2="280" stroke="#185FA5" stroke-width="1" marker-end="url(#arr)"/>
<line x1="770" y1="306" x2="770" y2="280" stroke="#BA7517" stroke-width="1" marker-end="url(#arr)"/>

<!-- ======================================= -->
<!-- ROW 3: Paper 5 (Intervention)           -->
<!-- ======================================= -->
<rect x="330" y="400" width="300" height="56" rx="8" fill="#FCE8E8" stroke="#B53030" stroke-width="1.5"/>
<text x="480" y="422" text-anchor="middle" font-size="14" font-weight="600" fill="#7A1A1A">Paper 5</text>
<text x="480" y="440" text-anchor="middle" font-size="12" fill="#B53030">Training-pipeline proposal</text>

<!-- Series → P6: dashed arrows (motivated by, not dependent) -->
<path d="M460 278 L460 398" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="440" y="375" text-anchor="end" font-size="10" fill="#999">motivates</text>

<!-- P5 → P6: dashed diagonal -->
<path d="M770 278 L560 398" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>

<!-- P6 independent support (below) -->
<rect x="330" y="484" width="300" height="48" rx="6" fill="#fff" stroke="#B53030" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="480" y="505" text-anchor="middle" font-size="11" fill="#7A1A1A">Verification literature, cross-domain precedent</text>
<text x="480" y="520" text-anchor="middle" font-size="11" font-style="italic" fill="#999">independent of series diagnosis</text>

<!-- Support arrow (upward into P6) -->
<line x1="480" y1="482" x2="480" y2="458" stroke="#B53030" stroke-width="1" marker-end="url(#arr)"/>

<!-- ======================================= -->
<!-- ROW 4: Graceful degradation             -->
<!-- ======================================= -->
<rect x="40" y="566" width="430" height="48" rx="6" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.8"/>
<text x="255" y="586" text-anchor="middle" font-size="12" font-weight="500" fill="#444">If Paper 1 findings do not replicate:</text>
<text x="255" y="603" text-anchor="middle" font-size="12" fill="#888">Papers 2, 3, 4, 5 retain independent support</text>

<rect x="490" y="566" width="410" height="48" rx="6" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.8"/>
<text x="695" y="586" text-anchor="middle" font-size="12" font-weight="500" fill="#444">If the CC lens does not hold as causal chain:</text>
<text x="695" y="603" text-anchor="middle" font-size="12" fill="#888">Individual analyses remain valid separately</text>

<!-- ======================================= -->
<!-- ROW 5: Epilogue                         -->
<!-- ======================================= -->
<rect x="330" y="646" width="300" height="40" rx="8" fill="#fff" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="480" y="663" text-anchor="middle" font-size="13" font-weight="500" font-style="italic" fill="#888">Epilogue — speculative</text>
<text x="480" y="678" text-anchor="middle" font-size="11" fill="#B4B2A9">Outside main sequence. Series complete without it.</text>

<!-- ======================================= -->
<!-- Legend (bottom)                          -->
<!-- ======================================= -->
<line x1="60" y1="710" x2="92" y2="710" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
<text x="100" y="714" font-size="11" fill="#555">Direct dependency</text>

<line x1="290" y1="710" x2="322" y2="710" stroke="#999" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="330" y="714" font-size="11" fill="#555">Informs / frames (not required)</text>

<rect x="580" y="702" width="16" height="16" rx="3" fill="#fff" stroke="#999" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="604" y="714" font-size="11" fill="#555">Independent external evidence</text>

</svg>