<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: var(--font-sans, 'Anthropic Sans', system-ui, sans-serif); font-size: 14px; font-weight: 500; fill: var(--color-text-primary, #1a1a1a); }
  .ts { font-family: var(--font-sans, 'Anthropic Sans', system-ui, sans-serif); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary, #666); }
  .arr { stroke: var(--color-text-secondary, #666); stroke-width: 1.5; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; }
  .coral-title { fill: #712B13; }
  .coral-sub { fill: #993C1D; }
  .coral-bar { fill: #F0997B; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-title { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  .teal-bar { fill: #5DCAA5; }
  .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
  .amber-title { fill: #633806; }
  .amber-sub { fill: #854F0B; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray-title { fill: #444441; }
  .purple-bar { fill: #AFA9EC; }
  .bar-text { fill: #444441; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e0e0e0; }
    .ts { fill: #999; }
    .arr { stroke: #999; }
    .coral-fill { fill: #712B13; stroke: #F0997B; }
    .coral-title { fill: #F5C4B3; }
    .coral-sub { fill: #F0997B; }
    .coral-bar { fill: #993C1D; }
    .teal-fill { fill: #085041; stroke: #5DCAA5; }
    .teal-title { fill: #9FE1CB; }
    .teal-sub { fill: #5DCAA5; }
    .teal-bar { fill: #0F6E56; }
    .amber-fill { fill: #633806; stroke: #EF9F27; }
    .amber-title { fill: #FAC775; }
    .amber-sub { fill: #EF9F27; }
    .gray-fill { fill: #444441; stroke: #B4B2A9; }
    .gray-title { fill: #D3D1C7; }
    .purple-bar { fill: #534AB7; }
    .bar-text { fill: #D3D1C7; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="340" y="32" text-anchor="middle">The dose problem</text>

<text class="ts" x="40" y="68">A professional's total daily AI interaction</text>

<rect x="40" y="78" width="600" height="40" rx="6" fill="none" stroke="var(--color-border-tertiary, #ccc)" stroke-width="0.5"/>
<rect class="coral-bar" x="40" y="78" width="480" height="40" rx="6" stroke-width="0"/>
<text class="bar-text th" x="280" y="100" text-anchor="middle" dominant-baseline="central">Ambient confident-output AI (80%)</text>
<rect class="teal-bar" x="520" y="78" width="120" height="40" stroke-width="0"/>
<text class="bar-text ts" x="580" y="100" text-anchor="middle" dominant-baseline="central">Mandated (20%)</text>

<text class="ts" x="580" y="138" text-anchor="middle">Pedagogical friction</text>
<text class="ts" x="580" y="152" text-anchor="middle">gets immunised</text>

<rect class="gray-fill" x="60" y="172" width="560" height="44" rx="8" stroke-width="0.5"/>
<text class="gray-title th" x="340" y="196" text-anchor="middle" dominant-baseline="central">User calibrates against total exposure, not mandated subset</text>

<text class="th" x="340" y="254" text-anchor="middle">Three paths to satisfying the dose requirement</text>

<rect class="coral-fill" x="40" y="274" width="190" height="80" rx="8" stroke-width="0.5"/>
<text class="coral-title th" x="135" y="296" text-anchor="middle" dominant-baseline="central">Path 1: Restrict</text>
<text class="coral-sub ts" x="135" y="314" text-anchor="middle" dominant-baseline="central">Regulate confident AI</text>
<text class="coral-sub ts" x="135" y="330" text-anchor="middle" dominant-baseline="central">across all interactions</text>

<rect class="amber-fill" x="245" y="274" width="190" height="80" rx="8" stroke-width="0.5"/>
<text class="amber-title th" x="340" y="296" text-anchor="middle" dominant-baseline="central">Path 2: Recertify</text>
<text class="amber-sub ts" x="340" y="314" text-anchor="middle" dominant-baseline="central">Restrict during training,</text>
<text class="amber-sub ts" x="340" y="330" text-anchor="middle" dominant-baseline="central">repeat periodically</text>

<rect class="teal-fill" x="450" y="274" width="190" height="80" rx="8" stroke-width="0.5"/>
<text class="teal-title th" x="545" y="296" text-anchor="middle" dominant-baseline="central">Path 3: Reform</text>
<text class="teal-sub ts" x="545" y="314" text-anchor="middle" dominant-baseline="central">Change what models</text>
<text class="teal-sub ts" x="545" y="330" text-anchor="middle" dominant-baseline="central">default to (Paper 5)</text>

<text class="ts" x="135" y="374" text-anchor="middle">Most politically costly</text>
<text class="ts" x="340" y="374" text-anchor="middle">Operationally expensive</text>
<text class="ts" x="545" y="374" text-anchor="middle">No coercion needed</text>

<line x1="135" y1="388" x2="545" y2="388" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="402" text-anchor="middle">Decreasing political cost, increasing feasibility</text>

<text class="ts" x="40" y="432">Resulting exposure under each path:</text>

<text class="ts" x="40" y="454">Path 1</text>
<rect class="teal-bar" x="90" y="442" width="550" height="22" rx="4" stroke-width="0"/>
<text class="bar-text ts" x="365" y="455" text-anchor="middle" dominant-baseline="central">All AI calibrated by regulation</text>

<text class="ts" x="40" y="486">Path 2</text>
<rect class="coral-bar" x="90" y="474" width="440" height="22" rx="4" stroke-width="0"/>
<rect class="teal-bar" x="530" y="474" width="110" height="22" rx="4" stroke-width="0"/>
<text class="bar-text ts" x="310" y="487" text-anchor="middle" dominant-baseline="central">Ambient confident (decays between cycles)</text>
<text class="bar-text ts" x="585" y="487" text-anchor="middle" dominant-baseline="central">Training</text>

<text class="ts" x="40" y="518">Path 3</text>
<rect class="teal-bar" x="90" y="506" width="390" height="22" rx="4" stroke-width="0"/>
<rect class="purple-bar" x="480" y="506" width="160" height="22" rx="4" stroke-width="0"/>
<text class="bar-text ts" x="285" y="519" text-anchor="middle" dominant-baseline="central">Baseline calibrated by training reform</text>
<text class="bar-text ts" x="560" y="519" text-anchor="middle" dominant-baseline="central">Remaining gaps</text>

<text class="ts" x="340" y="558" text-anchor="middle">Paper 5's training reform changes the baseline; Paper 4's proposals work without coercion</text>
</svg>
