<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: var(--font-sans, 'Anthropic Sans', system-ui, sans-serif); font-size: 14px; font-weight: 500; fill: var(--color-text-primary, #1a1a1a); }
  .ts { font-family: var(--font-sans, 'Anthropic Sans', system-ui, sans-serif); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary, #666); }
  .arr { stroke: var(--color-text-secondary, #666); stroke-width: 1.5; }
  .leader { stroke: var(--color-text-tertiary, #999); stroke-width: 0.5; stroke-dasharray: 3 3; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .purple-title { fill: #3C3489; }
  .purple-sub { fill: #534AB7; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-title { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  .coral-fill { fill: #FAECE7; stroke: #993C1D; }
  .coral-title { fill: #712B13; }
  .coral-sub { fill: #993C1D; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray-title { fill: #444441; }
  .gray-sub { fill: #5F5E5A; }
  .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
  .amber-title { fill: #633806; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e0e0e0; }
    .ts { fill: #999; }
    .arr { stroke: #999; }
    .leader { stroke: #666; }
    .purple-fill { fill: #3C3489; stroke: #AFA9EC; }
    .purple-title { fill: #CECBF6; }
    .purple-sub { fill: #AFA9EC; }
    .teal-fill { fill: #085041; stroke: #5DCAA5; }
    .teal-title { fill: #9FE1CB; }
    .teal-sub { fill: #5DCAA5; }
    .coral-fill { fill: #712B13; stroke: #F0997B; }
    .coral-title { fill: #F5C4B3; }
    .coral-sub { fill: #F0997B; }
    .gray-fill { fill: #444441; stroke: #B4B2A9; }
    .gray-title { fill: #D3D1C7; }
    .gray-sub { fill: #B4B2A9; }
    .amber-fill { fill: #633806; stroke: #EF9F27; }
    .amber-title { fill: #FAC775; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="340" y="32" text-anchor="middle">The co-calibration spiral</text>

<rect class="purple-fill" x="200" y="52" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="purple-title th" x="340" y="72" text-anchor="middle" dominant-baseline="central">AI produces confident output</text>
<text class="purple-sub ts" x="340" y="90" text-anchor="middle" dominant-baseline="central">Optimised by RLHF for helpfulness</text>

<rect class="teal-fill" x="430" y="180" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="teal-title th" x="540" y="200" text-anchor="middle" dominant-baseline="central">User trusts and defers</text>
<text class="teal-sub ts" x="540" y="218" text-anchor="middle" dominant-baseline="central">Trust premium literature</text>

<rect class="teal-fill" x="200" y="308" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="teal-title th" x="340" y="328" text-anchor="middle" dominant-baseline="central">User rewards confidence</text>
<text class="teal-sub ts" x="340" y="346" text-anchor="middle" dominant-baseline="central">Penalises hedging via feedback</text>

<rect class="coral-fill" x="30" y="180" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="coral-title th" x="140" y="200" text-anchor="middle" dominant-baseline="central">RLHF amplifies confidence</text>
<text class="coral-sub ts" x="140" y="218" text-anchor="middle" dominant-baseline="central">Training optimises for signal</text>

<path d="M480 108 L510 178" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="516" y="142" text-anchor="start">Confident output</text>

<path d="M510 236 L480 306" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="516" y="276" text-anchor="start">Adapted expectations</text>

<path d="M200 336 L170 236" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="164" y="286" text-anchor="end">Preference data</text>

<path d="M170 180 L200 110" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="164" y="142" text-anchor="end">Next generation</text>

<text class="ts" x="340" y="218" text-anchor="middle">No internal breaking mechanism</text>

<rect class="gray-fill" x="40" y="410" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="gray-title th" x="180" y="428" text-anchor="middle" dominant-baseline="central">AI drifts without user escalation</text>
<text class="gray-sub ts" x="180" y="446" text-anchor="middle" dominant-baseline="central">Joint Anthropic-OpenAI eval, 2025</text>

<rect class="gray-fill" x="360" y="410" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="gray-title th" x="500" y="428" text-anchor="middle" dominant-baseline="central">User confidence amplifies drift</text>
<text class="gray-sub ts" x="500" y="446" text-anchor="middle" dominant-baseline="central">Sicilia et al., NAACL 2025</text>

<line class="leader" x1="180" y1="410" x2="140" y2="238"/>
<line class="leader" x1="500" y1="410" x2="540" y2="238"/>

<rect class="amber-fill" x="100" y="490" width="480" height="36" rx="8" stroke-width="0.5"/>
<text class="amber-title th" x="340" y="510" text-anchor="middle" dominant-baseline="central">Occasional hedging gets immunised, not accommodated</text>

<text class="ts" x="340" y="545" text-anchor="middle">Expectation violation literature: single inconsistency dismissed as anomaly</text>
</svg>
